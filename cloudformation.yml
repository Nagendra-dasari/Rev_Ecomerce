AWSTemplateFormatVersion: '2010-09-09'
Description: 'Nagendra Commerce Stack'

Resources:
  # S3 Bucket for Frontend
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: nagendra-commerce-frontend
      AccessControl: PublicRead
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html

  # CloudFront Distribution
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - DomainName: !GetAtt FrontendBucket.RegionalDomainName
            Id: S3Origin
            S3OriginConfig:
              OriginAccessIdentity: ''
        Enabled: true
        DefaultRootObject: index.html
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none

  # ECS Cluster
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: nagendra-commerce-cluster

  # Task Definition for Backend
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: nagendra-backend
      Cpu: '256'
      Memory: '512'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt ExecutionRole.Arn
      ContainerDefinitions:
        - Name: backend
          Image: YOUR_ECR_URI/backend:latest
          Essential: true
          PortMappings:
            - ContainerPort: 8000
          Environment:
            - Name: MONGO_URI
              Value: !Ref MongoURI
            - Name: SECRET_KEY
              Value: !Ref SecretKey

  # ECS Service
  ECSService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: nagendra-backend-service
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets: !Ref Subnets
          SecurityGroups: !Ref SecurityGroup

  # IAM Role for ECS
  ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

Parameters:
  MongoURI:
    Type: String
    Default: mongodb://admin:password@your-mongo-host:27017/nagendra_commerce
  SecretKey:
    Type: String
    Default: your-secret-key
  Subnets:
    Type: List<AWS::EC2::Subnet::Id>
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup::Id